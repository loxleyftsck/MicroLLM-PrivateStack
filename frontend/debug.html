<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroLLM Debug Test</title>
    <meta name="robots" content="noindex, nofollow"><!-- prevent crawling -->
    <style>
        body {
            font-family: system-ui;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        pre {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .result {
            margin: 20px 0;
        }
        h1 { color: #6366f1; }
    </style>
</head>
<body>
    <h1>🔍 MicroLLM Debug Test</h1>
    
    <div>
        <h3>Step 1: Test Health</h3>
        <button onclick="testHealth()">Test /health endpoint</button>
        <div id="health" class="result"></div>
    </div>
    
    <div>
        <h3>Step 2: Test Chat</h3>
        <button onclick="testChat()">Test /api/chat endpoint</button>
        <div id="chat" class="result"></div>
    </div>
    
    <div>
        <h3>Step 3: Check Browser Console</h3>
        <p>Press F12 → Console tab untuk lihat errors</p>
    </div>

    <script>
        const API = 'http://localhost:8000';

        // ================================================================
        // MEDIUM-1 REMEDIATION (2026-02-28): Debug Surface Gate
        // This page is only accessible when the server reports debug_mode=true.
        // In production (DEBUG=false in .env), the page renders an access-denied
        // message and all test functions are disabled.
        //
        // WHY: debug.html auto-fired unauthenticated /api/chat requests on load,
        // exposing the API surface to any user who navigated to the URL.
        // The auto-run is removed; all tests require explicit button click.
        // ================================================================
        async function enforceDebugGate() {
            try {
                const res = await fetch(API + '/health');
                const data = await res.json();
                if (data?.debug_mode !== true) {
                    document.body.innerHTML = `
                        <div style="text-align:center;padding:80px;color:#ff4444">
                            <h2>🚫 Access Denied</h2>
                            <p>Debug interface is only available in development mode.</p>
                            <p style="color:#888;font-size:12px">Set DEBUG=true in server config to enable.</p>
                        </div>`;
                    return false;
                }
            } catch (err) {
                document.body.innerHTML = `
                    <div style="text-align:center;padding:80px;color:#ff4444">
                        <h2>⚠️ Server Unreachable</h2>
                        <p>Could not verify debug mode. Debug interface locked.</p>
                    </div>`;
                return false;
            }
            return true;
        }

        async function testHealth() {
            const div = document.getElementById('health');
            div.textContent = 'Testing...';

            try {
                console.log('Fetching:', API + '/health');
                const res = await fetch(API + '/health');
                console.log('Response status:', res.status);
                const data = await res.json();
                console.log('Response data:', data);

                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(data, null, 2); // textContent — safe
                div.innerHTML = '';
                const ok = document.createElement('p');
                ok.style.color = 'lime';
                ok.textContent = `✓ SUCCESS (${res.status})`;
                div.appendChild(ok);
                div.appendChild(pre);
            } catch (err) {
                console.error('Error:', err);
                div.innerHTML = '';
                const fail = document.createElement('p');
                fail.style.color = 'red';
                fail.textContent = '✗ FAILED';
                const details = document.createElement('pre');
                details.textContent = err.message; // textContent — safe
                div.appendChild(fail);
                div.appendChild(details);
            }
        }

        async function testChat() {
            const div = document.getElementById('chat');
            div.textContent = 'Sending message...';

            try {
                console.log('Posting to:', API + '/api/chat');
                const res = await fetch(API + '/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: 'Hello test'})
                });
                console.log('Response status:', res.status);
                const data = await res.json();
                console.log('Response data:', data);

                const pre = document.createElement('pre');
                pre.textContent = JSON.stringify(data, null, 2); // textContent — safe
                div.innerHTML = '';
                const ok = document.createElement('p');
                ok.style.color = 'lime';
                ok.textContent = `✓ SUCCESS (${res.status})`;
                div.appendChild(ok);
                div.appendChild(pre);
            } catch (err) {
                console.error('Error:', err);
                div.innerHTML = '';
                const fail = document.createElement('p');
                fail.style.color = 'red';
                fail.textContent = '✗ FAILED';
                const details = document.createElement('pre');
                details.textContent = err.message; // textContent — safe
                div.appendChild(fail);
                div.appendChild(details);
            }
        }

        // Gate enforced on load. Auto-run of testHealth() REMOVED (was MEDIUM-1).
        // All tests now require explicit user action.
        window.onload = () => enforceDebugGate();
    </script>
</body>
</html>
